name: Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # -e . 會解析 pyproject 的 paulsha-hippo SHA pin（可解析性即 CI gate）
          python -m pip install -e .
          python -m pip install pytest -r requirements-stage9.txt -r requirements-stage11.txt

      - name: Smoke import pinned hippo
        run: python -c "import paulsha_hippo, paulsha_hippo.lib.lifecycle; print(paulsha_hippo.__version__)"

      - name: Run test suite
        run: python -m pytest tests/ -q
