schema_version: 1
split:
  boundary_patterns:
    - '^#{1,6}\s'
  max_fragment_chars: 8000
artifact_kind_map:
  research: research
  plan: plan
  plans: plan
  spec: spec
  report: report
  reports: report
  review: review
  session: report
  sessions: report
phase_map:
  research: research
  spec: define
  plan: plan
  report: review
  review: review
default_artifact_kind: report
default_phase: review
agent_exec:
  command:
    - scripts/claude-gemma4
  timeout_seconds: 600
  model: gemma4-26b-a4b-nvfp4
  max_output_tokens: 8192
  upstream_url: http://192.0.2.10:8001
# #175: 預設 llm 蒸餾。identity 會把 importer 樣板 fragments 1:1 複製成
# knowledge slices（樣板噪音），僅保留為顯式 --promoter identity（測試/離線）。
promoter: llm
skill_path: skills/atomize-knowledge-slice.md
