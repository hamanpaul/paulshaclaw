# paulshaclaw — global config sample
#
# This is the first paulshaclaw-wide config (Stage 9 introduces it).
# Real deployments should copy this to ~/.config/paulshaclaw/paulshaclaw.yaml
# and customise. The loader honours --config flag → PAULSHACLAW_CONFIG env →
# default path → this sample (read-only fallback).

workspaces:
  - path: ~/prj_arc
    name: archive
  - path: ~/prj_pri
    name: private

monitor:
  poll_interval_seconds: 60      # workspace scan cadence
  watch_debounce_ms: 500         # filesystem event debounce
  legacy_policy: list-only       # list-only | hide
  socket_path: ~/.agents/run/project-monitor.sock
  ignore_dirs: []                # extra patterns; .git/node_modules already implicit

cost:
  timezone: Asia/Taipei
  cache_ttl_seconds: 120
  tmux_refresh_seconds: 30
  colors:
    warning_percent: 70
    critical_percent: 90
  providers:
    copilot:
      accounts:
        - id: hamanpaul
          label: haman
          kind: personal
          monthly_allowance: 1500
        - id: paulc-arc
          label: arc
          kind: company
          monthly_allowance: 300
          org: example-org
