# paulshaclaw — global config sample
#
# This is the first paulshaclaw-wide config (Stage 9 introduces it).
# Real deployments should copy this to ~/.config/paulshaclaw/paulshaclaw.yaml
# and customise. Stage 8 cost runtime only honours --config →
# PAULSHACLAW_CONFIG env → default path; this sample is documentation only.

workspaces:
  - path: ~/prj_arc
    name: archive
  - path: ~/prj_pri
    name: private

monitor:
  poll_interval_seconds: 60      # workspace scan cadence
  watch_debounce_ms: 500         # filesystem event debounce
  legacy_policy: list-only       # list-only | hide
  socket_path: ~/.agents/run/project-monitor.sock
  ignore_dirs: []                # extra patterns; .git/node_modules already implicit

cost:
  timezone: Asia/Taipei
  cache_ttl_seconds: 120
  tmux_refresh_seconds: 30
  colors:
    warning_percent: 70
    critical_percent: 90
  providers:
    copilot:
      accounts:
        - id: hamanpaul
          label: haman
          kind: personal
          monthly_allowance: 1500
        - id: paulc-arc
          label: arc
          kind: company
          monthly_allowance: 300
          org: example-org

chat:
  provider: openai_compatible
  providers:
    openai_compatible:
      base_url_env: OPENAI_BASE_URL
      api_key_env: OPENAI_API_KEY
      model_env: OPENAI_MODEL
      timeout_seconds: 180
      max_tokens: 256
      temperature: 0.2
    gemini_api:
      enabled: false
      api_key_env: GEMINI_API_KEY
      model: gemini-2.5-flash
    copilot_oauth:
      enabled: false
      token_env: COPILOT_GITHUB_TOKEN
      oauth_config_path: ~/.copilot/config.json
